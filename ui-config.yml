---
type: zero-touch

default_width: 35
persist_url_state: true
view_switcher:
  enabled: true
  default_mode: split

antora:
  name: modules
  dir: www
  modules:
    - name: index
      label: "Welcome"
    - name: module-01
      label: "Module 1: Admin Task"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: module-02
      label: "Module 2: Bash Script on Bastion"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: module-03
      label: "Module 3: As Developer User"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: conclusion
      label: "Conclusion"

tabs:
  - name: Terminal
    url: '/wetty'
    external: false
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
    external: false

skipModuleEnabled: true
