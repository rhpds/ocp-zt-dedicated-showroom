---
# Module 1 — Ansible + kubernetes.core as cluster-admin
- name: Module 1 Validation — verify demo-project exists
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check namespace exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: v1
        kind: Namespace
        name: demo-project
      register: r_ns

    - name: Check developer RoleBinding exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: developer-admin
        namespace: demo-project
      register: r_rb

    - name: Validate
      validation_check:
        check: "{{ r_ns.resources | length > 0 and r_rb.resources | length > 0 }}"
        pass_msg: "Namespace demo-project exists and developer has admin access"
        error_msg: |
          Namespace demo-project or developer RoleBinding not found.

          As cluster-admin:
            oc new-project demo-project
            oc adm policy add-role-to-user admin developer -n demo-project
