---
# Module 2 Validation — calls a bash script to check ConfigMap
# Demonstrates: Ansible wrapping a bash validation script
# The bash script (validate-module2.sh) uses Python kubernetes library
- name: Module 2 Validation — run bash validation script
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Run validate-module2.sh
      ansible.builtin.script:
        executable: /bin/bash
        cmd: "{{ playbook_dir }}/validate-module2.sh"
      environment:
        KUBECONFIG: "{{ k8s_kubeconfig | default('') }}"
        PROJECT_NS: dev-project
      register: r_validate
      ignore_errors: true

    - name: Report validation result
      validation_check:
        check: "{{ r_validate.rc == 0 }}"
        pass_msg: "{{ r_validate.stdout | trim }}"
        error_msg: "{{ r_validate.stdout | trim }}"
