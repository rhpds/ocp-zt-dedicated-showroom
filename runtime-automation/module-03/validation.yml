---
- name: Build SSH inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - ansible.builtin.add_host:
        name: bastion
        ansible_host: "{{ bastion_host }}"
        ansible_port: "{{ bastion_port | default(22) }}"
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_password: "{{ bastion_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

- name: Validate developer user access
  hosts: bastion
  gather_facts: false
  tasks:
    - name: Check secret as developer
      ansible.builtin.shell: |
        oc get secret dev-secret -n demo-project --as developer
      register: r_secret
      ignore_errors: true

    - name: Validate
      validation_check:
        check: "{{ r_secret.rc == 0 }}"
        pass_msg: "✅ Secret dev-secret exists and developer can access it"
        error_msg: |
          ❌ Secret dev-secret not found or developer cannot access it.

          As developer:
            oc create secret generic dev-secret \
              --from-literal=api-key=my-key \
              -n demo-project
